# Optimized Nginx config for 320 PNG sequence frames
# Fixes 10+ minute load time → target < 10 seconds

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript image/svg+xml;
    gzip_comp_level 6;

    # Open file cache for 320 PNG files
    open_file_cache max=500 inactive=5m;
    open_file_cache_valid 2m;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    # Aggressive caching for PNG sequence frames
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Cache CSS/JS
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # HTML with short cache
    location / {
        try_files $uri $uri.html $uri/index.html /index.html =404;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
